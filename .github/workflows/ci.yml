name: DNSForge CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate code, architecture and generated BIND configuration
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install BIND validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends bind9utils bind9-dnsutils

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Python syntax compilation
        run: python -m compileall -q src tests

      - name: Ruff lint
        run: ruff check src tests

      - name: Ruff format check
        run: ruff format --check src tests

      - name: Architecture gates
        run: pytest -q tests/architecture

      - name: Run pytest suite
        run: pytest -q

      - name: Validate generated BIND configuration explicitly
        run: pytest -q tests/bind/test_generated_bind_config_validation.py

      - name: Coverage gate
        run: pytest -q --cov=src/dnsforge --cov-report=term-missing --cov-fail-under=60

      - name: Build package
        run: python -m build

      - name: Install built wheel and test dnsforge entrypoint
        shell: bash
        run: |
          python -m venv /tmp/dnsforge-wheel-test
          /tmp/dnsforge-wheel-test/bin/python -m pip install --upgrade pip
          /tmp/dnsforge-wheel-test/bin/python -m pip install dist/*.whl
          /tmp/dnsforge-wheel-test/bin/dnsforge --help

  advisory-security:
    name: Advisory security checks
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install security tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Bandit static security scan
        run: bandit -q -r src/dnsforge

      - name: Dependency vulnerability audit
        run: pip-audit
