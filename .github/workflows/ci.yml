name: DNSForge CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate code, architecture and generated BIND configuration
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    env:
      DNSFORGE_FORBID_SKIPS: "1"
      PYTHON_VERSION: ${{ matrix.python-version }}
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install BIND validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends bind9 bind9utils bind9-dnsutils

      - name: Normalize repository hygiene before validation
        run: sudo -E python tools/clean.py --fix

      - name: Repository hygiene gate
        run: python tools/clean.py --check-source

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Python syntax compilation
        run: python -m compileall -q src tests

      - name: Ruff lint
        run: ruff check src tests

      - name: Ruff format check
        run: ruff format --check src tests

      - name: Mypy type check
        run: mypy src/dnsforge

      - name: Regenerate commands documentation
        run: PYTHONPATH=src python tools/generate_commands_doc.py

      - name: Release consistency gate
        run: PYTHONPATH=src python tools/release_check.py --skip-dist

      - name: Product hardening gates
        run: |
          PYTHONPATH=src python tools/check_cli_coverage.py
          PYTHONPATH=src python tools/check_api_coverage.py
          PYTHONPATH=src python tools/check_event_coverage.py
          PYTHONPATH=src python tools/check_service_coverage.py
          PYTHONPATH=src python tools/product_gate.py
          PYTHONPATH=src python tools/check_enterprise_validation.py
          PYTHONPATH=src python tools/check_platform_support.py
          PYTHONPATH=src python tools/check_upgrade_certification.py
          PYTHONPATH=src python tools/check_operational_readiness.py
          PYTHONPATH=src python tools/check_documentation_parity.py
          PYTHONPATH=src python tools/check_cli_api_parity.py
          PYTHONPATH=src python tools/check_dead_code.py
          PYTHONPATH=src python tools/check_ga_readiness.py
          PYTHONPATH=src python tools/check_documentation_parity.py
          PYTHONPATH=src python tools/check_cli_api_parity.py
          PYTHONPATH=src python tools/check_dead_code.py
          PYTHONPATH=src python tools/check_ga_readiness.py

      - name: Architecture gates
        run: sudo -E env PATH="$PATH" PYTHONPATH="$PYTHONPATH" DNSFORGE_FORBID_SKIPS="$DNSFORGE_FORBID_SKIPS" python -m pytest -q -rs tests/architecture

      - name: Run pytest suite
        run: sudo -E env PATH="$PATH" PYTHONPATH="$PYTHONPATH" DNSFORGE_FORBID_SKIPS="$DNSFORGE_FORBID_SKIPS" python -m pytest -q -rs

      - name: Validate generated BIND configuration explicitly
        run: sudo -E env PATH="$PATH" PYTHONPATH="$PYTHONPATH" DNSFORGE_FORBID_SKIPS="$DNSFORGE_FORBID_SKIPS" python -m pytest -q -rs tests/bind/test_generated_bind_config_validation.py tests/bind/test_live_named_smoke.py

      - name: Coverage gate
        run: sudo -E env PATH="$PATH" PYTHONPATH="$PYTHONPATH" DNSFORGE_FORBID_SKIPS="$DNSFORGE_FORBID_SKIPS" python -m pytest -q -rs --cov=src/dnsforge --cov=src/dnsforge_manager --cov-report=term-missing --cov-fail-under=90

      - name: Write quality report
        run: python tools/quality_report.py

      - name: Build package
        run: |
          sudo -E python tools/clean.py --fix
          python tools/clean.py --check-source
          python -m build
          PYTHONPATH=src python tools/product_gate.py
          PYTHONPATH=src python tools/check_enterprise_validation.py
          PYTHONPATH=src python tools/check_platform_support.py
          PYTHONPATH=src python tools/check_upgrade_certification.py
          PYTHONPATH=src python tools/check_operational_readiness.py
          PYTHONPATH=src python tools/release_check.py
          sudo -E python tools/clean.py --fix-release
          python tools/clean.py --check-release

      - name: Verify distribution artifacts
        shell: bash
        run: |
          python tools/clean.py --check-release
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Install built wheel and test dnsforge entrypoint
        shell: bash
        run: |
          python -m venv /tmp/dnsforge-wheel-test
          /tmp/dnsforge-wheel-test/bin/python -m pip install --upgrade pip
          WHEEL="$(python -c 'from pathlib import Path; wheels=sorted(Path("dist").glob("dnsforge-*.whl")); assert len(wheels) == 1, f"expected exactly one DNSForge wheel, found {len(wheels)}: {[str(w) for w in wheels]}"; print(wheels[0])')"
          /tmp/dnsforge-wheel-test/bin/python -m pip install "$WHEEL"
          /tmp/dnsforge-wheel-test/bin/python -c "import dnsforge; import dnsforge.interfaces.cli.main"
          /tmp/dnsforge-wheel-test/bin/dnsforge --help
          sudo -E /tmp/dnsforge-wheel-test/bin/dnsforge version
          /tmp/dnsforge-wheel-test/bin/dnsforge initialize --help

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: dnsforge-dist-${{ matrix.python-version }}
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error

  security:
    name: Blocking security checks
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install security tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Bandit static security scan
        run: bandit -q -r src/dnsforge

      - name: Dependency vulnerability audit
        run: pip-audit --progress-spinner off --desc off .

      - name: Write security summary
        run: |
          {
            echo "# DNSForge security checks"
            echo ""
            echo "- Bandit: blocking"
            echo "- pip-audit: blocking"
          } >> "$GITHUB_STEP_SUMMARY"
