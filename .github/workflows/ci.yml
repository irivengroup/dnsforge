name: DNSForge CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate code and generated BIND configuration
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install BIND validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends bind9utils bind9-dnsutils

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Python syntax compilation
        run: python -m compileall -q src tests

      - name: Ruff lint
        run: ruff check src tests

      - name: Assert no Bash tests remain
        run: |
          if find tests -type f \( -name '*.sh' -o -name '*.bash' \) | grep -q .; then
            echo "Bash tests are not allowed under tests/. Convert them to pytest." >&2
            find tests -type f \( -name '*.sh' -o -name '*.bash' \) >&2
            exit 1
          fi

      - name: Run pytest suite
        run: pytest -q

      - name: Validate generated BIND configuration explicitly
        run: pytest -q tests/bind/test_generated_bind_config_validation.py
