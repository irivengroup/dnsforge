repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: dnsforge-release-gate-source
        name: DNSForge source release gate
        entry: python tools/release_check.py --skip-dist
        language: system
        pass_filenames: false
