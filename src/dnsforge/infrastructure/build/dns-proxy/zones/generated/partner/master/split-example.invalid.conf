zone "split-example.invalid" {

        type master;

        file "/var/named/master/partner/split-example.invalid.zone";

        allow-query {
                partner_clients;
        };

        dnssec-policy "{{ DNSSEC_POLICY_NAME }}";

        inline-signing yes;

        allow-transfer {
                none;
        };

        allow-update {
                none;
        };

        notify no;
};
