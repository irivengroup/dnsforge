zone "catalog-secondary-a.invalid" {

        type secondary;

        file "/var/named/secondary/external/catalog-secondary-a.invalid.zone";

        primaries {
                {{ AUTH_CLUSTER_A_PRIMARIES_BIND }}
        };

        allow-notify {
                {{ AUTH_CLUSTER_A_ALLOW_NOTIFY_BIND }}
        };

        allow-query {
                any;
        };

        allow-transfer {
                none;
        };
};
