zone "partner-zone.invalid" {

        type secondary;

        file "/var/named/secondary/partner/partner-zone.invalid.zone";

        primaries {
                {{ AUTHORITATIVE_BACK_IP_PRIMARIES_BIND }}
        };

        allow-notify {
                {{ AUTHORITATIVE_BACK_IP_ALLOW_NOTIFY_BIND }}
        };

        allow-query {
                {{ ZONE_ACL_PARTNER }}
        };

        allow-transfer {
                none;
        };
};
