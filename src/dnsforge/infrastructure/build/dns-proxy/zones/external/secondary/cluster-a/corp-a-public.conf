zone "corp-a-public.invalid" {
        type secondary;
        file "/var/named/secondary/external/corp-a-public.invalid.zone";
        primaries {
                {{ AUTH_CLUSTER_A_PRIMARIES_BIND }}
        };
        allow-notify {
                {{ AUTH_CLUSTER_A_ALLOW_NOTIFY_BIND }}
        };
        allow-query {
                {{ ZONE_ACL_PUBLIC }}
        };

        allow-transfer {
                none;
        };
};
