zone "example-public.invalid" {

        type secondary;

        file "/var/named/secondary/external/example-public.invalid.zone";

        primaries {
                {{ AUTHORITATIVE_BACK_IP_PRIMARIES_BIND }}
        };

        allow-notify {
                {{ AUTHORITATIVE_BACK_IP_ALLOW_NOTIFY_BIND }}
        };

        allow-query {
                {{ ZONE_ACL_PUBLIC }}
        };

        allow-transfer {
                none;
        };
};
