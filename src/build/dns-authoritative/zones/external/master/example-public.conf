zone "example-public.invalid" {

        type master;

        file "/var/named/master/external/example-public.invalid.zone";

        allow-query {
                transfer_clients;
        };

        allow-transfer {
                key "{{ TSIG_KEY_NAME }}";
        };

        also-notify {
                {{ PROXY_TRANSFER_CLIENTS }}
        };

        notify yes;
};
