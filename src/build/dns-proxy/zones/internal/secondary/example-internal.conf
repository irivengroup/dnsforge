zone "example-internal.invalid" {

        type secondary;

        file "/var/named/secondary/internal/example-internal.invalid.zone";

        primaries {
                {{ AUTHORITATIVE_BACK_IP_PRIMARIES_BIND }}
        };

        allow-notify {
                {{ AUTHORITATIVE_BACK_IP_ALLOW_NOTIFY_BIND }}
        };

        allow-query {
                {{ ZONE_ACL_INTERNAL }}
        };

        allow-transfer {
                none;
        };
};
