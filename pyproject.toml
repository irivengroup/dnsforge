[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "zoneforge-dnsaas"
version = "9.2.0"
description = "ZoneForge DNSaaS - Plateforme de Déploiement et de Configuration DNS as a Service"
requires-python = ">=3.9"
readme = "README.md"
authors = [
  { name = "Alfred TCHONDJO" }
]

[project.scripts]
dnsforge = "dnsforge.interfaces.cli.main:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
include = ["dnsforge*"]
