[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "dnsforge"
version = "10.5.16"
description = "DNSForge - Enterprise BIND deployment and configuration platform"
requires-python = ">=3.9"
readme = "README.md"
authors = [
  { name = "Alfred TCHONDJO" }
]

[project.scripts]
dnsforge = "dnsforge.interfaces.cli.main:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
include = ["dnsforge*"]

[project.optional-dependencies]
dev = [
  "pytest>=8",
  "ruff>=0.6",
]

[tool.ruff]
line-length = 120
target-version = "py39"

[tool.ruff.lint]
select = ["E9", "F63", "F7", "F82"]
ignore = []

[tool.setuptools.package-data]
dnsforge = [
  "infrastructure/bind/resources/**/*.j2",
  "infrastructure/bind/resources/**/*.tpl",
]
