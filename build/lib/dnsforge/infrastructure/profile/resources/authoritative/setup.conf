# ZoneForge DNSaaS
# Plateforme de Déploiement et de Configuration DNS as a Service
# Profile: authoritative
#
# Template generated from variables currently present in src/settings.
# Edit before creating the node-specific .env file.

# Authoritative DNS service; RPZ forced to no.

# ------------------------------------------------------------------------------
# Identity
# ------------------------------------------------------------------------------
ROLE="dns-authoritative"
NODE_NAME="svr01a"

# ------------------------------------------------------------------------------
# Network
# ------------------------------------------------------------------------------
BACK_IP="REPLACE_BACK_IP"
ADM_IP="REPLACE_ADM_IP"
VIP_BACK_IP="REPLACE_VIP_BACK_IP"
PEER_BACK_IP="REPLACE_PEER_BACK_IP"

# ------------------------------------------------------------------------------
# Features
# ------------------------------------------------------------------------------
ENABLE_RPZ="no"
ENABLE_RRL="yes"
ENABLE_DNSSEC="no"

# ------------------------------------------------------------------------------
# RNDC / TSIG
# ------------------------------------------------------------------------------
RNDC_KEY_NAME="rndc-key"
TSIG_KEY_NAME="xfr-shared-key"
TSIG_SECRET="CHANGE_ME_BASE64"

# ------------------------------------------------------------------------------
# HA / Keepalived
# ------------------------------------------------------------------------------
KEEPALIVED_AUTH_PASS="CHANGE_ME"

# ------------------------------------------------------------------------------
# Security / ACL
# ------------------------------------------------------------------------------
ADM_ALLOWED_CLIENTS="REPLACE_ADM_CIDR"

# ------------------------------------------------------------------------------
# Additional settings imported from current settings
# ------------------------------------------------------------------------------
PROXY_TRANSFER_CLIENTS="REPLACE_PROXY_BACK_IP_1; REPLACE_PROXY_BACK_IP_2;"
KEEPALIVED_INTERFACE="REPLACE_BACK_INTERFACE"
KEEPALIVED_STATE="MASTER"
KEEPALIVED_PRIORITY="110"
KEEPALIVED_VRID="51"
RRL_RESPONSES_PER_SECOND="20"
RRL_REFERRALS_PER_SECOND="5"
RRL_NXDOMAINS_PER_SECOND="10"
RRL_ERRORS_PER_SECOND="10"
RRL_WINDOW="5"
DNSSEC_POLICY_NAME="binddns-default"
DNSSEC_KEY_DIRECTORY="/var/named/dnssec"
DNSSEC_SIGNING_MODE="policy"
BINDDNS_VERSION="5.0"

SECURITY_PROFILE="enterprise"

ENABLE_DNS_COOKIES="yes"

ENABLE_QNAME_MINIMIZATION="yes"

ENABLE_SERVE_STALE="yes"

HIDE_BIND_VERSION="yes"

MINIMAL_RESPONSES="yes"

MINIMAL_ANY="yes"

ENABLE_CLUSTER="no"

CLUSTER_NAME="dnsforge-cluster"

CLUSTER_PEERS=""

CLUSTER_PRIORITY="100"

CLUSTER_AUTH_PASS=""

CLUSTER_ROLE="authoritative"

CLUSTER_VIP=""

CLUSTER_INTERFACE=""
